<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maritime Intelligence | Smart Supply Chain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #map { height: 650px; width: 100%; border-radius: 0.75rem; z-index: 10; background: #f1f5f9; }
        .ui-card {
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        }
        .layer-control {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        .suggestion-box {
            position: absolute;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            z-index: 2000;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        .suggestion-item {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.875rem;
        }
        .suggestion-item:hover {
            background-color: #f8fafc;
            color: #2563eb;
        }
        .btn-primary {
            background: #2563eb;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
        /* Custom scrollbar for suggestions */
        .suggestion-box::-webkit-scrollbar { width: 6px; }
        .suggestion-box::-webkit-scrollbar-track { background: #f1f5f9; }
        .suggestion-box::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <!-- Header -->
    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-[1001]">
        <div class="flex items-center space-x-4">
            <div class="bg-blue-600 p-2 rounded-lg text-white shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <div>
                <h1 class="font-bold text-lg text-slate-800 tracking-tight">SmartSupply AI</h1>
                <p class="text-[10px] text-slate-500 uppercase font-semibold tracking-widest leading-none mt-1">Maritime Logistics Brain</p>
            </div>
        </div>
        <div class="flex items-center space-x-6">
            <div id="connection-badge" class="flex items-center bg-slate-50 px-4 py-1.5 rounded-full border border-slate-200">
                <span class="h-2 w-2 rounded-full bg-red-500 mr-2" id="global-status-dot"></span>
                <span class="text-xs font-bold text-slate-600" id="global-status-text">OFFLINE</span>
            </div>
            <div class="flex items-center space-x-3 border-l border-slate-200 pl-6">
                <div class="text-right hidden md:block">
                    <p class="text-xs font-bold text-slate-800">Harsh Deep</p>
                    <p class="text-[10px] text-slate-500">Logistics Manager</p>
                </div>
                <div class="h-8 w-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-xs border border-blue-200">
                    HD
                </div>
            </div>
        </div>
    </nav>

    <main class="p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 max-w-[1600px] mx-auto">
        
        <!-- Left: Operations Panel -->
        <div class="lg:col-span-3 space-y-6">
            <!-- Voyage Planner -->
            <div class="ui-card p-5 rounded-xl">
                <h3 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-wider">Voyage Planner</h3>
                
                <div class="space-y-4">
                    <!-- Start Port -->
                    <div class="relative">
                        <label class="text-[11px] font-bold text-slate-500 uppercase block mb-1.5 ml-1">Origin Port</label>
                        <div class="relative">
                            <input type="text" id="start-input" placeholder="Search origin..." class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all">
                            <div id="start-suggestions" class="suggestion-box hidden"></div>
                        </div>
                    </div>

                    <!-- Destination Port -->
                    <div class="relative">
                        <label class="text-[11px] font-bold text-slate-500 uppercase block mb-1.5 ml-1">Destination Port</label>
                        <div class="relative">
                            <input type="text" id="dest-input" placeholder="Search destination..." class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all">
                            <div id="dest-suggestions" class="suggestion-box hidden"></div>
                        </div>
                    </div>

                    <button onclick="calculateRouteFromInputs()" class="btn-primary w-full text-white py-3 px-4 rounded-lg flex items-center justify-center font-bold text-sm shadow-sm">
                        <span>Optimize Route</span>
                        <svg class="ml-2 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7l5 5m0 0l-5 5m5-5H6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                </div>
            </div>

            <!-- Real-time Metrics -->
            <div class="ui-card p-5 rounded-xl">
                <h3 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-wider">Live Telemetry</h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-center py-2 border-b border-slate-50">
                        <span class="text-xs text-slate-500">Wave Height</span>
                        <span id="tel-waves" class="text-sm font-bold text-blue-600">--</span>
                    </div>
                    <div class="flex justify-between items-center py-2 border-b border-slate-50">
                        <span class="text-xs text-slate-500">Wind Speed</span>
                        <span id="tel-wind" class="text-sm font-bold text-slate-700">--</span>
                    </div>
                    <div class="flex justify-between items-center py-2">
                        <span class="text-xs text-slate-500">Risk Profile</span>
                        <span id="tel-risk" class="text-[10px] font-bold bg-green-100 text-green-700 px-2 py-0.5 rounded uppercase">Nominal</span>
                    </div>
                </div>
            </div>

            <!-- Mini AIS Tracker -->
            <div class="ui-card rounded-xl overflow-hidden">
                <div class="px-4 py-3 bg-slate-50 border-b border-slate-200">
                    <h3 class="text-xs font-bold text-slate-600 uppercase tracking-tighter">Live AIS Feed</h3>
                </div>
                <iframe 
                    width="100%" 
                    height="180" 
                    src="https://www.marinetraffic.com/en/ais/embed/zoom:5/centery:15/centerx:70/maptype:4/shownames:false/mmsi:0/shipid:123065/fleet:/fleet_id:/vtypes:/show_menu:false" 
                    frameborder="0">
                </iframe>
            </div>
        </div>

        <!-- Center: Interactive Map Visualization -->
        <div class="lg:col-span-9 relative">
            <div class="ui-card p-1 rounded-xl shadow-sm relative">
                <div id="map"></div>
                
                <!-- Map Legend -->
                <div class="absolute bottom-6 left-6 z-[1000] bg-white/90 backdrop-blur-md p-4 rounded-lg border border-slate-200 shadow-lg hidden md:block">
                    <h4 class="text-[10px] font-black text-slate-400 uppercase mb-2">Map Legend</h4>
                    <div class="space-y-2">
                        <div class="flex items-center space-x-3">
                            <div class="w-3 h-3 rounded-full bg-blue-500"></div>
                            <span class="text-xs font-medium text-slate-600">Standard Lane</span>
                        </div>
                        <div class="flex items-center space-x-3">
                            <div class="w-3 h-3 rounded-full bg-amber-500"></div>
                            <span class="text-xs font-medium text-slate-600">AI Detour</span>
                        </div>
                        <div class="flex items-center space-x-3">
                            <div class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></div>
                            <span class="text-xs font-medium text-slate-600">Wave Hazard</span>
                        </div>
                    </div>
                </div>

                <!-- Layer Toggles -->
                <div class="layer-control flex flex-col space-y-2">
                    <button onclick="toggleLayer('wind')" id="btn-wind" title="Wind Layer" class="bg-white p-2.5 rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50 shadow-sm transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 14l-7 7m0 0l-7-7m7 7V3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                    <button onclick="toggleLayer('clouds')" id="btn-clouds" title="Cloud Layer" class="bg-white p-2.5 rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50 shadow-sm transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                </div>
            </div>

            <!-- Dynamic Alert Overlay -->
            <div id="alert-overlay" class="hidden absolute top-8 left-1/2 -translate-x-1/2 z-[2000]">
                <div class="bg-amber-50 border border-amber-200 text-amber-800 px-6 py-2.5 rounded-full font-bold text-xs shadow-xl flex items-center space-x-3">
                    <div class="w-2 h-2 rounded-full bg-amber-500 animate-ping"></div>
                    <span>Diverting from primary lane due to storm Alpha</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = "http://127.0.0.1:8000";
        const OWM_API_KEY = "9fd714d642353381a1a5b8207137f8ed";

        // Port Suggestions Data
        const ports = [
            { name: "Singapore (SIN)", lat: 1.29, lon: 103.85 },
            { name: "Rotterdam (ROT)", lat: 51.92, lon: 4.47 },
            { name: "Mumbai (BOM)", lat: 18.97, lon: 72.82 },
            { name: "Shanghai (SHA)", lat: 31.23, lon: 121.47 },
            { name: "Los Angeles (LAX)", lat: 33.74, lon: -118.24 },
            { name: "New York (NYC)", lat: 40.71, lon: -74.00 },
            { name: "Dubai (DXB)", lat: 25.20, lon: 55.27 },
            { name: "Port Said (PSD)", lat: 31.26, lon: 32.30 },
            { name: "Colombo (CMB)", lat: 6.94, lon: 79.84 },
            { name: "Hamburg (HAM)", lat: 53.55, lon: 9.99 }
        ];

        // UI State
        let selectedStart = ports[8]; // Default Colombo
        let selectedDest = ports[0];  // Default Singapore

        // Initial Map Setup (Light Theme)
        let map = L.map('map', {
            zoomControl: false,
            attributionControl: false,
            maxBounds: [[-70, -180], [80, 180]]
        }).setView([15.0, 65.0], 4);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            subdomains: 'abcd'
        }).addTo(map);

        const weatherLayers = {
            wind: L.tileLayer(`https://tile.openweathermap.org/map/wind_new/{z}/{x}/{y}.png?appid=${OWM_API_KEY}`),
            clouds: L.tileLayer(`https://tile.openweathermap.org/map/clouds_new/{z}/{x}/{y}.png?appid=${OWM_API_KEY}`)
        };

        let currentPathLine;
        let environmentMarkers = [];

        // Suggestion Logic
        function setupSuggestions(inputId, suggestionId, onSelect) {
            const input = document.getElementById(inputId);
            const box = document.getElementById(suggestionId);

            input.addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase();
                box.innerHTML = '';
                if (!val) { box.classList.add('hidden'); return; }

                const filtered = ports.filter(p => p.name.toLowerCase().includes(val));
                if (filtered.length > 0) {
                    box.classList.remove('hidden');
                    filtered.forEach(p => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.innerText = p.name;
                        div.onclick = () => {
                            input.value = p.name;
                            box.classList.add('hidden');
                            onSelect(p);
                        };
                        box.appendChild(div);
                    });
                } else {
                    box.classList.add('hidden');
                }
            });

            // Close on click away
            document.addEventListener('click', (e) => {
                if (!input.contains(e.target) && !box.contains(e.target)) {
                    box.classList.add('hidden');
                }
            });
        }

        setupSuggestions('start-input', 'start-suggestions', (p) => selectedStart = p);
        setupSuggestions('dest-input', 'dest-suggestions', (p) => selectedDest = p);

        async function fetchEnvironment() {
            try {
                const res = await fetch(`${API_BASE_URL}/environment-data`);
                const data = await res.json();
                environmentMarkers.forEach(m => map.removeLayer(m));
                environmentMarkers = [];

                data.disruptions.forEach(d => {
                    const circle = L.circle([d.lat, d.lon], {
                        radius: d.radius * 111000,
                        color: '#f43f5e',
                        fillColor: '#f43f5e',
                        fillOpacity: 0.1,
                        weight: 1,
                        dashArray: '4, 4'
                    }).addTo(map);
                    circle.bindTooltip(`WEATHER HAZARD: ${d.name}`, { direction: 'top' });
                    environmentMarkers.push(circle);
                });

                data.tide_stations.forEach(t => {
                    const marker = L.circleMarker([t.lat, t.lon], {
                        radius: 6,
                        color: t.trend === 'rising' ? '#22c55e' : '#ef4444',
                        fillOpacity: 0.9,
                        weight: 2,
                        fillColor: 'white'
                    }).addTo(map);
                    marker.bindPopup(`<b>${t.name}</b><br>Tide: ${t.level}`);
                    environmentMarkers.push(marker);
                });
            } catch (e) { console.warn("Environment sync paused."); }
        }

        async function checkHealth() {
            const dot = document.getElementById('global-status-dot');
            const text = document.getElementById('global-status-text');
            try {
                const res = await fetch(`${API_BASE_URL}/environment-data`);
                if (res.ok) {
                    dot.className = "h-2 w-2 rounded-full bg-green-500 mr-2";
                    text.innerText = "BRAIN ONLINE";
                }
            } catch (e) {
                dot.className = "h-2 w-2 rounded-full bg-red-500 mr-2";
                text.innerText = "BRAIN OFFLINE";
            }
        }

        async function calculateRouteFromInputs() {
            if (!selectedStart || !selectedDest) return;
            
            try {
                const response = await fetch(`${API_BASE_URL}/calculate-route`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        source: { lat: selectedStart.lat, lon: selectedStart.lon }, 
                        destination: { lat: selectedDest.lat, lon: selectedDest.lon } 
                    })
                });
                const data = await response.json();
                
                if (currentPathLine) map.removeLayer(currentPathLine);

                currentPathLine = L.polyline(data.path, {
                    color: data.status === "OPTIMIZED" ? '#f59e0b' : '#3b82f6',
                    weight: 4,
                    opacity: 0.8,
                    dashArray: data.status === "OPTIMIZED" ? '8, 8' : null
                }).addTo(map);

                map.flyToBounds(currentPathLine.getBounds(), { padding: [80, 80], duration: 1 });

                document.getElementById('tel-waves').innerText = data.environmental_stats.avg_wave_height;
                document.getElementById('tel-wind').innerText = data.environmental_stats.wind_speed;
                const riskEl = document.getElementById('tel-risk');
                riskEl.innerText = data.status === "OPTIMIZED" ? "ELEVATED" : "NOMINAL";
                riskEl.className = data.status === "OPTIMIZED" ? "text-[10px] font-bold bg-amber-100 text-amber-700 px-2 py-0.5 rounded uppercase" : "text-[10px] font-bold bg-green-100 text-green-700 px-2 py-0.5 rounded uppercase";
                
                const alert = document.getElementById('alert-overlay');
                if (data.status === "OPTIMIZED") alert.classList.remove('hidden');
                else alert.classList.add('hidden');

            } catch (e) {
                console.error("Routing logic failed. Check if main.py is running.");
            }
        }

        function toggleLayer(type) {
            const btn = document.getElementById(`btn-${type}`);
            if (map.hasLayer(weatherLayers[type])) {
                map.removeLayer(weatherLayers[type]);
                btn.classList.remove('text-blue-600', 'bg-blue-50', 'border-blue-200');
            } else {
                weatherLayers[type].addTo(map);
                btn.classList.add('text-blue-600', 'bg-blue-50', 'border-blue-200');
            }
        }

        // Init
        document.getElementById('start-input').value = selectedStart.name;
        document.getElementById('dest-input').value = selectedDest.name;
        
        setInterval(checkHealth, 5000);
        setInterval(fetchEnvironment, 10000);
        fetchEnvironment();
        checkHealth();
    </script>
</body>
</html>
